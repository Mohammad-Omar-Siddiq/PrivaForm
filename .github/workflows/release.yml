name: Release Build

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-release-notes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      release_body: ${{ steps.generate_notes.outputs.release_body }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Release Notes
        id: generate_notes
        run: |
          # Get the current tag
          CURRENT_TAG="${{ github.ref_name }}"
          
          # Get the previous tag (most recent tag before current)
          PREVIOUS_TAG=$(git tag --sort=-version:refname --merged $CURRENT_TAG | grep -v "^$CURRENT_TAG$" | head -1)
          
          # If no previous tag exists, get all commits
          if [ -z "$PREVIOUS_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%h %s")
          else
            COMMITS=$(git log $PREVIOUS_TAG..$CURRENT_TAG --pretty=format:"%h %s")
          fi
          
          # Initialize arrays for different categories
          FEATURES=""
          BUGFIXES=""
          IMPROVEMENTS=""
          OTHER=""
          
          # Parse commits and categorize them
          while IFS= read -r commit; do
            if [[ $commit == *"feat:"* ]] || [[ $commit == *"feature:"* ]]; then
              FEATURES+="- ${commit#* }"$'\n'
            elif [[ $commit == *"fix:"* ]] || [[ $commit == *"bugfix:"* ]]; then
              BUGFIXES+="- ${commit#* }"$'\n'
            elif [[ $commit == *"improvement:"* ]] || [[ $commit == *"improve:"* ]]; then
              IMPROVEMENTS+="- ${commit#* }"$'\n'
            else
              OTHER+="- ${commit#* }"$'\n'
            fi
          done <<< "$COMMITS"
          
          # Build release notes
          RELEASE_BODY="## 📋 Release Notes for $CURRENT_TAG"$'\n\n'
          
          if [ -n "$FEATURES" ]; then
            RELEASE_BODY+="### ✨ Features"$'\n'"$FEATURES"$'\n'
          fi
          
          if [ -n "$BUGFIXES" ]; then
            RELEASE_BODY+="### 🐛 Bug Fixes"$'\n'"$BUGFIXES"$'\n'
          fi
          
          if [ -n "$IMPROVEMENTS" ]; then
            RELEASE_BODY+="### 🚀 Improvements"$'\n'"$IMPROVEMENTS"$'\n'
          fi
          
          if [ -n "$OTHER" ]; then
            RELEASE_BODY+="### 📝 Other Changes"$'\n'"$OTHER"$'\n'
          fi
          
          # Output as multiline string
          echo "release_body<<EOF" >> $GITHUB_OUTPUT
          echo "$RELEASE_BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  build:
    needs: generate-release-notes
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            artifact_name: PrivaForm.exe
            asset_name: PrivaForm-Windows.exe
          - os: macos-latest
            artifact_name: PrivaForm
            asset_name: PrivaForm-macOS
          - os: ubuntu-latest
            artifact_name: PrivaForm
            asset_name: PrivaForm-Linux
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install pillow img2pdf pyinstaller

      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        run: pyinstaller --onefile --windowed --icon=icon.ico --distpath dist --name PrivaForm convert.py

      - name: Build executable (macOS/Linux)
        if: runner.os != 'Windows'
        run: pyinstaller --onefile --distpath dist --name PrivaForm convert.py

      - name: Generate SHA-256 checksum (Windows)
        if: runner.os == 'Windows'
        run: certutil -hashfile dist\PrivaForm.exe SHA256 > dist\PrivaForm.exe.sha256

      - name: Generate SHA-256 checksum (macOS/Linux)
        if: runner.os != 'Windows'
        run: sha256sum dist/PrivaForm > dist/PrivaForm.sha256

      - name: Rename artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          mv dist/PrivaForm dist/PrivaForm-macOS
          mv dist/PrivaForm.sha256 dist/PrivaForm-macOS.sha256

      - name: Rename artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          mv dist/PrivaForm dist/PrivaForm-Linux
          mv dist/PrivaForm.sha256 dist/PrivaForm-Linux.sha256

      - name: Upload Windows artifact for VT scan
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v5
        with:
          name: PrivaForm-Windows-exe
          path: dist/PrivaForm.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ needs.generate-release-notes.outputs.release_body }}
          files: |
            dist/PrivaForm*
            dist/*.sha256
          append_body: true

  virustotal-scan:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows exe
        uses: actions/download-artifact@v5
        with:
          name: PrivaForm-Windows-exe

      - name: Upload to VirusTotal
        id: vt
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VIRUSTOTAL_API_KEY }}
          files: PrivaForm.exe

      - name: Add VT result to release notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          append_body: true
          body: |
            ## 🛡️ VirusTotal Scan
            ${{ steps.vt.outputs.analysis }}
